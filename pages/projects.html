<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projects - Adriella Kristie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #a1b161;
      --text: #1a1814;
      --muted: #888580;
      --border: #c8c5bd;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding-top: 100px;
    }

    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    .page-header {
      padding: 60px 24px 40px;
      text-align: center;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3.5rem;
      letter-spacing: 0.1em;
      color: var(--text);
      margin-bottom: 10px;
    }

    .page-subtitle {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 20px;
    }

    .back-link {
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.3s;
    }

    .back-link:hover {
      opacity: 0.6;
    }

    /* ─────────────────────────────────────────
       PROJECTS GRID
    ───────────────────────────────────────── */
    .projects-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 80px;
    }

    .projects-grid {
      display: flex;
      gap: 60px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      max-width: 1400px;
    }

    .project-item {
      position: relative;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .project-item:hover {
      transform: translateY(-5px);
    }

    .plate-image {
      display: block;
      width: 320px;
      height: auto;
      transition: opacity 0.3s ease;
    }

    .plate-normal {
      opacity: 1;
    }

    .plate-broken {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
    }

    .project-item:hover .plate-normal {
      opacity: 0;
    }

    .project-item:hover .plate-broken {
      opacity: 0.7;
    }

    .project-item:hover .project-name {
      opacity: 1;
    }

    /* When clicked/active */
    .project-item.clicked .plate-normal {
      opacity: 0;
    }

    .project-item.clicked .plate-broken {
      opacity: 1;
    }

    /* Project name overlay */
    .project-name {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      color: var(--text);
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      white-space: nowrap;
      text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.3);
    }

    .project-item.clicked .project-name {
      opacity: 1;
    }

    /* Project link */
    .project-link {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .projects-grid {
        gap: 40px;
      }

      .plate-image {
        width: 280px;
      }

      .page-title {
        font-size: 2.5rem;
      }

      .project-name {
        font-size: 1.5rem;
      }
    }

    /* ─────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px;
      text-align: center;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* ─────────────────────────────────────────
       NAVIGATION BAR
    ───────────────────────────────────────── */
    .main-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
    }

    .main-nav {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .nav-left,
    .nav-right {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .nav-link {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: #ffffff;
      text-decoration: none;
      transition: color 0.3s ease;
      white-space: nowrap;
    }

    .nav-link:hover {
      color: rgba(255, 255, 255, 0.7);
    }

    .nav-center {
      display: flex;
      align-items: center;
      margin: 0 12px;
    }

    .logo-link {
      display: block;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .logo-link img {
      display: block;
      height: 60px;
      width: auto;
    }

    .logo-link:hover {
      transform: scale(1.15);
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <header class="main-header">
    <nav class="main-nav">
      <div class="nav-left">
        <a href="projects.html" class="nav-link">Projects</a>
        <a href="#labs" class="nav-link">Labs (Coming Soon)</a>
      </div>
      <div class="nav-center">
        <a href="../index.html" class="logo-link" aria-label="Home">
          <img src="../photo1.png" alt="AK Logo" />
        </a>
      </div>
      <div class="nav-right">
        <a href="aboutme.html" class="nav-link">About Me</a>
        <a href="contact.html" class="nav-link">Contact</a>
      </div>
    </nav>
  </header>

  <header class="page-header">
    <h1 class="page-title">Projects</h1>
    <p class="page-subtitle">View these web apps using your laptops or computers!</p>
    <a href="../index.html" class="back-link">← Back to Home</a>
  </header>

  <main class="projects-container">
    <div class="projects-grid">
      
      <!-- Project 1: On The Way -->
      <div class="project-item" data-project="1">
        <img src="../plate1.PNG" alt="Plate 1" class="plate-image plate-normal">
        <img src="../brokenplate1.png" alt="Broken Plate 1" class="plate-image plate-broken">
        <div class="project-name">On The Way</div>
        <a href="ontheway.html" class="project-link"></a>
      </div>

      <!-- Project 2: Ecobite -->
      <div class="project-item" data-project="2">
        <img src="../plate2.PNG" alt="Plate 2" class="plate-image plate-normal">
        <img src="../brokenplate2.png" alt="Broken Plate 2" class="plate-image plate-broken">
        <div class="project-name">Ecobite</div>
        <a href="ecobite.html" class="project-link"></a>
      </div>

      <!-- Project 3: Merangkai -->
      <div class="project-item" data-project="3">
        <img src="../plate3.PNG" alt="Plate 3" class="plate-image plate-normal">
        <img src="../brokenplate3.png" alt="Broken Plate 3" class="plate-image plate-broken">
        <div class="project-name">Merangkai</div>
        <a href="merangkai.html" class="project-link"></a>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    © Adriella Kristie — All rights reserved
  </footer>

  <script src="../grain.js"></script>
  <script>
    // Add click interaction for plates - navigate directly to detail page on click
    document.querySelectorAll('.project-item').forEach(item => {
      const link = item.querySelector('.project-link');
      
      item.addEventListener('click', function(e) {
        // Navigate to the detail page
        if (link) {
          window.location.href = link.href;
        }
      });
    });
  </script>
</body>
</html>
