<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>About Me - Adriella Kristie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #a1b161;
      --text: #1a1814;
      --muted: #888580;
      --border: #c8c5bd;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─────────────────────────────────────────
       HEADER
    ───────────────────────────────────────── */
    .page-header {
      padding: 40px 24px 20px;
      text-align: center;
    }

    .back-link {
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      display: inline-block;
      transition: opacity 0.3s;
    }

    .back-link:hover {
      opacity: 0.6;
    }

    /* ─────────────────────────────────────────
       ABOUT ME CONTENT
    ───────────────────────────────────────── */
    .about-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px 80px;
    }

    .about-content {
      display: flex;
      gap: 80px;
      align-items: center;
      justify-content: center;
      max-width: 1200px;
      width: 100%;
    }

    /* Left side - Text */
    .about-text {
      flex: 1;
      max-width: 500px;
    }

    .about-text p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      line-height: 2.2;
      color: var(--text);
      font-weight: 300;
      letter-spacing: 0.02em;
    }

    /* Right side - Photo */
    .about-photo {
      flex: 0 0 auto;
    }

    .photo-frame {
      position: relative;
    }

    .photo-frame img {
      display: block;
      width: 350px;
      height: auto;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .about-content {
        flex-direction: column;
        gap: 50px;
      }

      .about-text {
        order: 2;
        max-width: 600px;
      }

      .about-photo {
        order: 1;
      }

      .photo-frame img {
        width: 300px;
      }
    }

    @media (max-width: 768px) {
      .about-text p {
        font-size: 0.75rem;
        line-height: 2;
      }

      .photo-frame img {
        width: 250px;
      }

      .about-content {
        gap: 40px;
      }
    }

    /* ─────────────────────────────────────────
       FOOTER
    ───────────────────────────────────────── */
    .site-footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px;
      text-align: center;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text);
    }
  </style>
</head>
<body>

  <header class="page-header">
    <a href="../index.html" class="back-link">← Back to Home</a>
  </header>

  <main class="about-container">
    <div class="about-content">
      
      <!-- Left side - Text -->
      <div class="about-text">
        <p>
          Hi my name is Adriella Kristie. I am studying computer engineering and integrated design and media at New York University
        </p>
      </div>

      <!-- Right side - Photo -->
      <div class="about-photo">
        <div class="photo-frame">
          <img src="../aboutme.JPG" alt="Adriella Kristie" />
        </div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    © Adriella Kristie — All rights reserved
  </footer>

  <script src="../grain.js"></script>
</body>
</html>
